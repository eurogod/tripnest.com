name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tripnest_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (zero warnings)
        run: dotnet build --no-restore --configuration Release -warnaserror

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=tripnest_core_test;Username=postgres;Password=postgres"
          Jwt__Key: "ci-test-secret-key-must-be-at-least-32-chars-long"
          Jwt__Issuer: "TripNest.Core"
          Jwt__Audience: "TripNest.Core"

  facematch-tests:
    name: Face-match sidecar (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TripNest.Core/FaceMatchService
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        # DeepFace is mocked in the tests and imported lazily in main.py, so the heavy
        # tensorflow/deepface stack isn't needed here — install only what the tests touch.
        run: pip install fastapi==0.111.0 pydantic==2.7.4 httpx==0.28.1 requests==2.32.3 python-multipart==0.0.9 pytest==8.2.2

      - name: Run pytest
        run: python -m pytest tests/ -v
